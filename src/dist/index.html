<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Panetteria</title>
    <meta name="description" content="Vetrina per La Panetteria">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="">
    <header class="p-0 mb-0">
        <nav class="navbar navbar-expand-lg p-0 m-0">
            <div class="container-fluid px-5 border-bottom border-2 border-brown-main py-0 align-items-center">
                <a class="navbar-brand d-flex" href="#">
                    <img class="object-fit-cover pb-4 pt-0" src="./assets/logo3.png" width="300px">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"
                    aria-controls="mobileMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end m-0" tabindex="-1" id="mobileMenu">
                    <div class="offcanvas-header">
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav nav-underline justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link active" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Chi Siamo</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">I Nostri Prodotti</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Laboratorio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Contatti</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="container-fluid m-0 p-0">
        <section class="hero position-relative overflow-hidden align-content-center">
            <img class="position-absolute top-0 start-0 w-100 z-0 h-100 object-fit-cover" src="./assets/img/hero.jpeg"
                alt="" />

            <div class="hero-overlay position-absolute top-0 start-0 w-100 h-100"></div>

            <div class="container-fluid position-relative z-2 h-100 d-flex">
                <div class="col-12 col-lg-6 text-start text-beige-light px-4">
                    <h1 class="display-4 fw-bold mb-4">
                        Il profumo del pane, ogni giorno.
                    </h1>

                    <p class="lead mb-4 fw-medium">
                        Pane, focacce, dolci e prodotti da forno realizzati artigianalmente con ingredienti selezionati.
                    </p>

                    <div class="d-flex gap-3 flex-wrap">
                        <button type="button" class="btn btn-brown-main btn-lg px-4">
                            Scopri i prodotti
                        </button>

                        <button type="button" class="btn btn-outline-light btn-lg px-4">
                            Contattaci
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/bootstrap.bundle.js"></script>
</body>

</html>
