<!DOCTYPE html>

                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"

                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end m-0" tabindex="-1" id="mobileMenu">
                    <div class="offcanvas-header">

                    <div>
                        <h1 class="display-4 mb-4">
                            Il profumo del pane,<br> ogni giorno.
                        </h1>
                        <div class="spiga-separatore">
                            <span class="spiga-line"></span>

                            <svg class="spiga-grano" viewBox="-5 0 120 40" xmlns="http://www.w3.org/2000/svg">
                                <g xmlns="http://www.w3.org/2000/svg" fill="currentColor">

                                    <!-- gambo -->
                                    <rect x="5" y="19" width="35" height="3" rx="1" />

                                    <!-- foglie più sottili -->
                                    <path d="M42 20 C50 12 58 12 66 12 C62 18 54 22 42 20Z" />
                                    <path d="M42 20 C50 28 58 28 66 28 C62 22 54 18 42 20Z" />

                                    <path d="M74 20 C82 12 90 12 98 12 C94 18 86 22 74 20Z" />
                                    <path d="M74 20 C82 28 90 28 98 28 C94 22 86 18 74 20Z" />

                                    <!-- punta -->
                                    <path d="M92 20 C100 14 104 16 106 20 C104 24 100 26 92 20Z" />

                                </g>
                            </svg>

                            <span class="spiga-line"></span>
                        </div>
                    </div>

                    <p class="lead mb-4 fw-light">
                        Pane, focacce, dolci e prodotti da forno realizzati artigianalmente con ingredienti selezionati
                        e letivitazione naturale.
                    </p>

                    <div class="d-flex gap-3 flex-wrap">
                        <button type="button" class="btn btn-beige-light text-white fw-light rounded-1 btn-lg px-4">
                            SCOPRI I NOSTRI PRODOTTI
                        </button>
                    </div>
                </div>
            </div>

            <div class="container-fluid d-flex flex-row flex-wrap">
                <articole class="row d-flex flex-row">
                    <header class="col-4">

                    </header>
                    <main class="col-8">

                    </main>
